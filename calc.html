<html>
    <head>
        <meta http-equiv="content-type" content="text/html; charset=UTF-8"/>
        <script>
            function calc() {
                // 입력값 가져오기 (숫자 변환)
                var foodAmt = Number(document.getElementById("foodAmt").value); // 음식 금액
                var alcoholAmt = Number(document.getElementById("alcoholAmt").value); // 주류 금액
                
                var alcoholCnt = Number(document.getElementById("alcoholCnt").value); // 주류 인원
                var nonAlcoholCnt = Number(document.getElementById("nonAlcoholCnt").value); // 비주류 인원

                // 총 인원 및 총 사용금액 계산
                var totalCnt = alcoholCnt + nonAlcoholCnt;
                var totalPayAmt = foodAmt + alcoholAmt;

                if (totalCnt === 0) {
                    alert("인원을 입력해주세요.");
                    return;
                }

                // 1인당 정산 금액 계산 (천원 단위 올림)
                // 비주류 1인당 금액 = 음식금액 / 총인원
                var nonAlcoholPerAmt = Math.ceil((foodAmt / totalCnt) / 1000) * 1000;
                
                // 주류 1인당 금액 = (음식금액 / 총인원) + (주류금액 / 주류인원)
                var alcoholPerAmt = 0;
                if (alcoholCnt > 0) {
                    alcoholPerAmt = Math.ceil(((foodAmt / totalCnt) + (alcoholAmt / alcoholCnt)) / 1000) * 1000;
                }

                // 실제 총 걷히는 금액
                var totalInAmt = (alcoholPerAmt * alcoholCnt) + (nonAlcoholPerAmt * nonAlcoholCnt);
                
                // 남는 금액 (잔액)
                var remainAmt = totalInAmt - totalPayAmt;

                // 결과 텍스트 생성
                var result = "";
                result += "■ 걷은 금액 :\n";
                result += "- 주류 그룹: (" + alcoholPerAmt.toLocaleString() + "원) X (" + alcoholCnt + "명) = " + (alcoholPerAmt * alcoholCnt).toLocaleString() + "원\n";
                result += "- 비주류 그룹: (" + nonAlcoholPerAmt.toLocaleString() + "원) X (" + nonAlcoholCnt + "명) = " + (nonAlcoholPerAmt * nonAlcoholCnt).toLocaleString() + "원\n";
                result += "▶ 총 수거 금액: " + totalInAmt.toLocaleString() + "원\n\n";

                result += "■ 사용 금액 :\n";
                result += "- 음식 금액: " + foodAmt.toLocaleString() + "원\n";
                result += "- 주류 금액: " + alcoholAmt.toLocaleString() + "원\n";
                result += "▶ 총 지출 금액: " + totalPayAmt.toLocaleString() + "원\n\n";

                result += "■ 남은 금액 (잔액) :\n";
                result += remainAmt.toLocaleString() + "원 (천원단위 올림으로 인한 낙전)";

                // 화면 표시 및 클립보드 복사
                document.getElementById('result').innerHTML = result.replace(/\n/g, '<br/>');
                navigator.clipboard.writeText(result);
            }

            // 입력할 때마다 실시간으로 총금액과 총인원을 업데이트하는 함수
            function updateSummary() {
                var foodAmt = Number(document.getElementById("foodAmt").value) || 0;
                var alcoholAmt = Number(document.getElementById("alcoholAmt").value) || 0;
                var alcoholCnt = Number(document.getElementById("alcoholCnt").value) || 0;
                var nonAlcoholCnt = Number(document.getElementById("nonAlcoholCnt").value) || 0;

                // 실시간 화면 표시 (콤마 포맷팅 포함)
                document.getElementById("totalAmtText").innerText = (foodAmt + alcoholAmt).toLocaleString();
                document.getElementById("totalCntText").innerText = (alcoholCnt + nonAlcoholCnt).toLocaleString();
            }
        </script>
    </head>
    <body>
        <h3>회비 정산 계산기</h3>
        
        <fieldset style="margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; display: inline-block; min-width: 320px;">
            <legend><strong>1. 금액 입력</strong></legend>
            <input id="foodAmt" name="foodAmt" value="0" oninput="updateSummary()" /> 음식 금액<br/>
            <input id="alcoholAmt" name="alcoholAmt" value="0" oninput="updateSummary()" /> 주류 금액<br/>
            <div style="margin-top: 8px; color: #0056b3; font-weight: bold;">
                💰 입력 금액 합계: <span id="totalAmtText">0</span>원
            </div>
        </fieldset>
        <br/>

        <fieldset style="margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; display: inline-block; min-width: 320px;">
            <legend><strong>2. 인원 입력</strong></legend>
            <input id="alcoholCnt" name="alcoholCnt" value="0" oninput="updateSummary()" /> 주류 인원 (음식+주류 대상)<br/>
            <input id="nonAlcoholCnt" name="nonAlcoholCnt" value="0" oninput="updateSummary()" /> 비주류 인원 (음식만 대상)<br/>
            <div style="margin-top: 8px; color: #28a745; font-weight: bold;">
                👥 총 인원 합계: <span id="totalCntText">0</span>명
            </div>
        </fieldset>
        <br/>
