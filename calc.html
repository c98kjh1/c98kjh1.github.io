<html>
    <head>
        <meta http-equiv="content-type" content="text/html; charset=UTF-8"/>
        <style>
            /* 풍선도움말(Tooltip) 스타일 설정 */
            .tooltip {
                position: relative;
                display: inline-block;
                cursor: help;
                color: #007bff;
                font-weight: bold;
                margin-left: 5px;
                font-size: 0.9em;
            }
            /* 마우스 오버 시 나타날 말풍선 기본 디자인 */
            .tooltip .tooltiptext {
                visibility: hidden;
                width: 200px;
                background-color: #333;
                color: #fff;
                text-align: center;
                border-radius: 6px;
                padding: 6px 10px;
                position: absolute;
                z-index: 1;
                bottom: 125%; /* 아이콘 위쪽에 배치 */
                left: 50%;
                margin-left: -100px;
                opacity: 0;
                transition: opacity 0.2s;
                font-size: 0.85em;
                font-weight: normal;
                line-height: 1.3;
            }
            /* 말풍선 아래쪽 화살표 모양 */
            .tooltip .tooltiptext::after {
                content: "";
                position: absolute;
                top: 100%;
                left: 50%;
                margin-left: -5px;
                border-width: 5px;
                border-style: solid;
                border-color: #333 transparent transparent transparent;
            }
            /* 마우스 올리면 보이게 처리 */
            .tooltip:hover .tooltiptext {
                visibility: visible;
                opacity: 1;
            }
            /* 주류 항목 스타일 */
            .alcohol-item {
                margin-top: 5px;
            }
            .alcohol-item input[type="text"] {
                width: 80px;
                margin-right: 5px;
            }
            .btn-del {
                background-color: #dc3545;
                color: white;
                border: none;
                padding: 2px 6px;
                border-radius: 3px;
                cursor: pointer;
                font-size: 0.8em;
            }
            .btn-add {
                background-color: #28a745;
                color: white;
                border: none;
                padding: 4px 10px;
                border-radius: 3px;
                cursor: pointer;
                font-size: 0.85em;
                margin-top: 5px;
            }
        </style>
        <script>
            // 입력값에서 콤마를 제거하고 숫자로 변환하는 공통 함수
            function getNumberFromInput(id) {
                var element = document.getElementById(id);
                if (!element) return 0;
                var value = element.value;
                return Number(value.replace(/,/g, '')) || 0;
            }

            // 숫자에 콤마를 추가하는 함수 (요소 직접 전달 가능하도록 수정)
            function formatInputWithComma(element) {
                if (typeof element === 'string') {
                    element = document.getElementById(element);
                }
                if (!element) return;
                var num = Number(element.value.replace(/,/g, '')) || 0;
                if (num === 0) {
                    element.value = "0";
                } else {
                    element.value = num.toLocaleString();
                }
            }

            // 모든 주류 금액을 더하고 상세 내역 배열을 반환하는 함수
            function getAlcoholData() {
                var wrapper = document.getElementById("alcoholWrapper");
                var items = wrapper.getElementsByClassName("alcohol-item");
                var totalAlcoholAmt = 0;
                var list = [];

                for (var i = 0; i < items.length; i++) {
                    var nameInput = items[i].getElementsByClassName("alc-name")[0];
                    var amtInput = items[i].getElementsByClassName("alc-amt")[0];
                    
                    var name = nameInput.value.trim() || ("주류" + (i + 1));
                    var amt = Number(amtInput.value.replace(/,/g, '')) || 0;
                    
                    totalAlcoholAmt += amt;
                    if (amt > 0) {
                        list.push({ name: name, amt: amt });
                    }
                }
                return { total: totalAlcoholAmt, list: list };
            }

            // 주류 입력칸 추가 함수
            function addAlcoholInput() {
                var wrapper = document.getElementById("alcoholWrapper");
                var currentCount = wrapper.getElementsByClassName("alcohol-item").length;
                var nextNumber = currentCount + 1; // 다음 주류 번호 계산

                var div = document.createElement("div");
                div.className = "alcohol-item";
                div.innerHTML = `
                    <input type="text" class="alc-name" value="주류${nextNumber}" oninput="updateSummary()" />
                    <input type="text" class="alc-amt" value="0" oninput="updateSummary(this)" /> 원
                    <button type="button" class="btn-del" onclick="removeAlcoholInput(this)">삭제</button>
                `;
                wrapper.appendChild(div);
                updateSummary();
            }

            // 주류 입력칸 삭제 함수 및 이름 번호 재정렬
            function removeAlcoholInput(btn) {
                btn.parentElement.remove();
                
                // 삭제 후 남아있는 주류들의 번호를 주류1, 주류2 순서대로 다시 자동 정렬합니다.
                var wrapper = document.getElementById("alcoholWrapper");
                var items = wrapper.getElementsByClassName("alcohol-item");
                for (var i = 0; i < items.length; i++) {
                    var nameInput = items[i].getElementsByClassName("alc-name")[0];
                    // 사용자가 직접 이름을 수정한 경우는 건드리지 않고, 기본값 양식인 경우만 정렬
                    if (nameInput.value.startsWith("주류")) {
                        nameInput.value = "주류" + (i + 1);
                    }
                }
                
                updateSummary();
            }

            function calc() {
                var totalPayAmt = getNumberFromInput("totalPayAmt"); // 총 금액
                var alcoholData = getAlcoholData();
                var alcoholAmt = alcoholData.total; // 총 주류 금액
                                
                // 총 금액에서 주류 금액을 뺀 값을 음식 금액으로 정의
                var foodAmt = totalPayAmt - alcoholAmt; 
                if (foodAmt < 0) foodAmt = 0; // 음수 방지

                var alcoholCnt = getNumberFromInput("alcoholCnt"); // 주류 인원
                var nonAlcoholCnt = getNumberFromInput("nonAlcoholCnt"); // 비주류 인원

                // 총 인원 계산
                var totalCnt = alcoholCnt + nonAlcoholCnt;

                if (totalCnt === 0) {
                    alert("인원을 입력해주세요.");
                    return;
                }

                // 1인당 정산 금액 계산 (천원 단위 올림)
                // 비주류 1인당 금액 = 음식금액 / 총인원
                var nonAlcoholPerAmt = Math.ceil((foodAmt / totalCnt) / 1000) * 1000;
                                
                // 주류 1인당 금액 = (음식금액 / 총인원) + (주류금액 / 주류인원)
                var alcoholPerAmt = 0;
                if (alcoholCnt > 0) {
                    alcoholPerAmt = Math.ceil(((foodAmt / totalCnt) + (alcoholAmt / alcoholCnt)) / 1000) * 1000;
                }

                // 실제 총 걷히는 금액
                var totalInAmt = (alcoholPerAmt * alcoholCnt) + (nonAlcoholPerAmt * nonAlcoholCnt);
                                
                // 남는 금액 (잔액)
                var remainAmt = totalInAmt - totalPayAmt;

                // 결과 텍스트 생성
                var result = "";
                result += "■ 걷은 금액 :\n";
                result += "- 주류 : (" + alcoholPerAmt.toLocaleString() + "원) X (" + alcoholCnt + "명) = " + (alcoholPerAmt * alcoholCnt).toLocaleString() + "원\n";
                result += "- 비주류 : (" + nonAlcoholPerAmt.toLocaleString() + "원) X (" + nonAlcoholCnt + "명) = " + (nonAlcoholPerAmt * nonAlcoholCnt).toLocaleString() + "원\n";
                result += "▶ 총 걷은 금액 : " + totalInAmt.toLocaleString() + "원\n\n";

                result += "■ 사용 금액 :\n";
                result += "- 총 지출 금액 : " + totalPayAmt.toLocaleString() + "원\n";
                result += "  └ 음식 금액 : " + foodAmt.toLocaleString() + "원\n";
                result += "  └ 총 주류 금액 : " + alcoholAmt.toLocaleString() + "원\n";
                
                // 주류 상세 내역이 있으면 추가 표시
                if (alcoholData.list.length > 0) {
                    alcoholData.list.forEach(function(item) {
                        result += "    · " + item.name + " : " + item.amt.toLocaleString() + "원\n";
                    });
                }
                result += "\n";

                result += "■ 남은 금액 : ";
                result += remainAmt.toLocaleString() + "원";

                // 화면 표시 및 클립보드 복사
                document.getElementById('result').innerHTML = result.replace(/\n/g, '<br/>');
                navigator.clipboard.writeText(result);
            }

            // 입력할 때마다 실시간으로 수치들을 업데이트하는 함수
            function updateSummary(targetElement) {
                // 특정 필드에 입력이 들어왔을 때 콤마 포맷팅 처리
                if (targetElement) {
                    if (typeof targetElement === 'string') {
                        formatInputWithComma(targetElement);
                    } else {
                        formatInputWithComma(targetElement);
                    }
                } else {
                    // 전체 금액 필드는 기본적으로 포맷팅 확인
                    formatInputWithComma("totalPayAmt");
                }

                var totalPayAmt = getNumberFromInput("totalPayAmt");
                var alcoholData = getAlcoholData();
                var alcoholAmt = alcoholData.total;
                var alcoholCnt = getNumberFromInput("alcoholCnt");
                var nonAlcoholCnt = getNumberFromInput("nonAlcoholCnt");

                var foodAmt = totalPayAmt - alcoholAmt;
                if (foodAmt < 0) foodAmt = 0;

                document.getElementById("calculatedFoodAmtText").innerText = foodAmt.toLocaleString();
                document.getElementById("totalAmtText").innerText = totalPayAmt.toLocaleString();
                document.getElementById("totalCntText").innerText = (alcoholCnt + nonAlcoholCnt).toLocaleString();
            }
        </script>
    </head>
    <body>
        <h3>회비 정산 계산기</h3>
                
        <fieldset style="margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; display: inline-block; min-width: 340px;">
            <legend><strong>1. 금액 입력</strong></legend>
                        
            <input id="totalPayAmt" name="totalPayAmt" value="0" oninput="updateSummary('totalPayAmt')" /> 총 금액(영수증)
            <div class="tooltip">?
                <span class="tooltiptext">영수증 총금액을 입력하세요.</span>
            </div>
            <br/>
                        
            <!-- 주류 금액 동적 입력 영역 -->
            <div style="margin-top: 10px; margin-bottom: 5px; font-weight: bold; color: #555;">주류별 금액(음료도 가능)</div>
            <div id="alcoholWrapper">
                <div class="alcohol-item">
                    <input type="text" class="alc-name" value="주류1" oninput="updateSummary()" />
                    <input type="text" class="alc-amt" value="0" oninput="updateSummary(this)" /> 원
                </div>
            </div>
            <button type="button" class="btn-add" onclick="addAlcoholInput()">+ 주류 추가</button>
            <br/>
                        
            <div style="margin-top: 12px; color: #666; font-size: 0.9em;">
                💡 자동 계산된 음식 금액: <span id="calculatedFoodAmtText" style="font-weight: bold; color: #000;">0</span>원
            </div>
            <div style="margin-top: 4px; color: #0056b3; font-weight: bold;">
                💰 입력 금액 합계(총액): <span id="totalAmtText">0</span>원
            </div>
        </fieldset>
        <br/>

        <fieldset style="margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; display: inline-block; min-width: 340px;">
            <legend><strong>2. 인원 입력</strong></legend>
            <input id="alcoholCnt" name="alcoholCnt" value="0" oninput="updateSummary('alcoholCnt')" /> 주류 인원 (음식+주류 대상)<br/>
            <input id="nonAlcoholCnt" name="nonAlcoholCnt" value="0" oninput="updateSummary('nonAlcoholCnt')" /> 비주류 인원 (음식만 대상)<br/>
            <div style="margin-top: 8px; color: #28a745; font-weight: bold;">
                👥 총 인원 합계: <span id="totalCntText">0</span>명
            </div>
        </fieldset>
        <br/>
                
        <button onclick="calc();" style="padding: 8px 20px; font-weight: bold; cursor: pointer; background-color: #f0f0f0; border: 1px solid #aaa; border-radius: 4px;">결과 계산 및 복사</button>
        <br/><br/>

        <a href="./calc2.html"><b>1차 이상은 여기서...</b></a> 
        
                
        <p id="result" name="result" style="padding: 12px; border: 1px solid #ddd; display: inline-block; min-width: 340px; font-family: monospace; line-height: 1.5;"></p>
    </body>
</html>
